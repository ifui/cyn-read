name: Tauri V1 构建

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # Linux ARM64
  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    container:
      image: arm64v8/ubuntu:20.04
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            wget \
            curl \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            jq

      - name: Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 构建 Linux ARM64
        run: |
          npm install -g pnpm
          pnpm install
          pnpm tauri build

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          compression-level: 0

  # Windows x64
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 构建 Windows
        run: |
          npm install -g pnpm
          pnpm install
          pnpm tauri build

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          compression-level: 0

  # 发布 Release
  release:
    runs-on: ubuntu-latest
    needs: [build-linux-arm64, build-windows-x64]
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./

      - name: 查看文件结构
        run: ls -R

      - name: 获取版本号
        run: echo "APP_VERSION=$(jq -r .package.version src-tauri/tauri.conf.json)" >> $GITHUB_ENV

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.APP_VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## 📦 芯阅 Cyn-Read v${{ env.APP_VERSION }}
            轻量本地文档管理工具 | Tauri V1 构建

            ### 🖥️ 发布包
            - Windows x64：`.exe` 安装包 / `.msi` 安装包
            - Linux ARM64：`.deb` 银河麒麟 / `.AppImage` 通用版

            ### 📝 更新说明
          generate_release_notes: true
          files: |
            linux-arm64-build/deb/*.deb
            linux-arm64-build/appimage/*.AppImage
            windows-x64-build/msi/*.msi
            windows-x64-build/nsis/*.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
