name: Tauri V1 构建

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ====================
  # Linux ARM64（麒麟 / Ubuntu ARM）
  # ====================
  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    container:
      image: arm64v8/ubuntu:20.04
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            wget \
            curl \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            jq

      - name: 获取版本号
        run: echo "APP_VERSION=$(jq -r .package.version src-tauri/tauri.conf.json)" >> $GITHUB_ENV

      - name: Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 构建 Linux ARM64
        run: |
          npm install -g pnpm
          pnpm install
          pnpm tauri build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-build
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          compression-level: 0

  # ====================
  # 2. Windows x64
  # ====================
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 构建 Windows
        run: |
          npm install -g pnpm
          pnpm install
          pnpm tauri build

      - name: 上传 MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          compression-level: 0

  # ====================
  # 统一发布到 Release
  # ====================
  release:
    runs-on: ubuntu-latest
    needs: [build-linux-arm64, build-windows-x64]
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构建包
        uses: actions/download-artifact@v4

      - name: 获取版本号
        run: echo "APP_VERSION=$(jq -r .package.version src-tauri/tauri.conf.json)" >> $GITHUB_ENV

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.APP_VERSION }}"
          tag_name: ${{ github.ref_name }}
          files: |
            linux-arm64-build/*.deb
            linux-arm64-build/*.AppImage
            windows-x64-build/*.msi
            windows-x64-build/*.exe
          overwrite: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
